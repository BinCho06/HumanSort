<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="HumanSort – race the clock to manually sort shuffled columns by swapping them with clicks. Choose 20–50 columns and beat your best time!">
  <title>HumanSort</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d0d1a;
      --color:        #f0f0f0;
      --ctrl-bg:      #1a1a2e;
      --ctrl-border:  #0f3460;
      --btn-bg:       #0f3460;
      --btn-hover:    #e94560;
      --timer-color:  #4ecca3;
    }

    body.light {
      --bg:           #f0f4f8;
      --color:        #1a1a2e;
      --ctrl-bg:      #e2e8f0;
      --ctrl-border:  #94a3b8;
      --btn-bg:       #3b82f6;
      --btn-hover:    #1d4ed8;
      --timer-color:  #059669;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--color);
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.2s, color 0.2s;
    }

    body { display: flex; flex-direction: column; }

    /* ── Controls bar ── */
    #controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 14px;
      padding: 6px 12px;
      background: var(--ctrl-bg);
      border-bottom: 2px solid var(--ctrl-border);
      flex-shrink: 0;
      z-index: 10;
    }

    /* ── Difficulty toggle ── */
    #difficulty-group {
      display: flex;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--ctrl-border);
    }

    .diff-btn {
      padding: 4px 13px;
      background: transparent;
      color: var(--color);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      white-space: nowrap;
      transition: background 0.1s, color 0.1s;
    }
    .diff-btn:not(:last-child) { border-right: 1px solid var(--ctrl-border); }
    .diff-btn.active            { background: var(--btn-bg); color: #f0f0f0; }
    .diff-btn:hover:not(.active){ background: var(--btn-hover); color: #f0f0f0; }

    /* ── Shared button style ── */
    .ctrl-btn {
      padding: 5px 12px;
      background: var(--btn-bg);
      color: #f0f0f0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      white-space: nowrap;
    }
    .ctrl-btn:hover, .ctrl-btn:active { background: var(--btn-hover); }

    #timer {
      font-family: monospace;
      font-size: 17px;
      font-weight: bold;
      color: var(--timer-color);
      min-width: 72px;
    }

    /* ── Inputs panel ── */
    #inputs-wrap {
      position: relative;
      margin-left: auto;
    }
    #inputs-panel {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--ctrl-bg);
      border: 1px solid var(--ctrl-border);
      border-radius: 6px;
      padding: 8px 10px;
      z-index: 50;
      min-width: 180px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    }
    #inputs-panel.open { display: block; }
    #inputs-panel-title {
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.6;
      margin-bottom: 6px;
    }
    #mode-group {
      display: flex;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--ctrl-border);
    }
    .mode-btn {
      flex: 1;
      padding: 5px 0;
      background: transparent;
      color: var(--color);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      white-space: nowrap;
      transition: background 0.1s, color 0.1s;
    }
    .mode-btn:not(:last-child) { border-right: 1px solid var(--ctrl-border); }
    .mode-btn.active            { background: var(--btn-bg); color: #f0f0f0; }
    .mode-btn:hover:not(.active){ background: var(--btn-hover); color: #f0f0f0; }
    #mode-desc {
      font-size: 11px;
      margin-top: 6px;
      color: var(--color);
      opacity: 0.75;
      line-height: 1.4;
    }

    /* ── Theme icon button ── */
    #theme-toggle-btn {
      background: transparent;
      border: 1px solid var(--ctrl-border);
      border-radius: 6px;
      padding: 5px 8px;
      cursor: pointer;
      color: var(--color);
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    #theme-toggle-btn:hover { background: var(--btn-hover); color: #f0f0f0; border-color: var(--btn-hover); }

    /* ── Column arena ── */
    #arena {
      flex: 1;
      display: flex;
      align-items: flex-end;
      padding: 4px 6px 2px;
      gap: 2px;
      overflow: hidden;
      min-height: 0;
      max-height: min(600px, 65vh);
      margin: 8px;
      outline: 2px solid var(--ctrl-border);
      border-radius: 4px;
    }

    .bar {
      flex: 1;
      min-width: 0;
      border-radius: 3px 3px 0 0;
      cursor: pointer;
      background: #2563eb;
      transition: background 0.08s, transform 0.08s;
    }
    .bar:hover  { background: #7c3aed; }
    .bar.sel    { background: #eab308; transform: scaleX(1.05); }
    .bar.sorted { background: #10b981; cursor: default; }

    /* ── Win overlay ── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      z-index: 100;
    }
    #overlay.show { display: flex; }
    #overlay h2   { font-size: 36px; color: #10b981; }
    #overlay .lbl { font-size: 22px; color: #f0f0f0; }
    #overlay button {
      padding: 10px 28px;
      font-size: 16px;
      background: #0f3460;
      color: #f0f0f0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #overlay button:hover, #overlay button:active { background: #e94560; }

    /* Landscape hint for very small screens */
    @media screen and (max-height: 300px) {
      #controls { padding: 3px 8px; gap: 4px 10px; }
      #timer { font-size: 14px; }
    }
  </style>
</head>
<body>

  <div id="controls">
    <div id="difficulty-group">
      <button class="diff-btn" data-cols="20">Easy</button>
      <button class="diff-btn active" data-cols="30">Normal</button>
      <button class="diff-btn" data-cols="50">Hard</button>
    </div>
    <button id="new-game-btn" class="ctrl-btn">New Game</button>
    <span id="timer">00:00.0</span>
    <div id="inputs-wrap">
      <button id="inputs-btn" class="ctrl-btn">Inputs ▾</button>
      <div id="inputs-panel">
        <div id="inputs-panel-title">Move Mode</div>
        <div id="mode-group">
          <button class="mode-btn active" id="insert-btn">Insert</button>
          <button class="mode-btn" id="swap-btn">Swap</button>
        </div>
        <div id="mode-desc">Selected columns are inserted at the clicked position.</div>
      </div>
    </div>
    <button id="theme-toggle-btn" title="Toggle theme" aria-label="Toggle theme">
      <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>
  </div>

  <div id="arena"></div>

  <div id="overlay">
    <h2>🎉 Sorted!</h2>
    <div class="lbl" id="final-time"></div>
    <button id="play-again-btn">Play Again</button>
  </div>

  <script>
    /* ── DOM refs ── */
    const arena          = document.getElementById('arena');
    const timerEl        = document.getElementById('timer');
    const overlay        = document.getElementById('overlay');
    const finalTimeEl    = document.getElementById('final-time');
    const diffBtns       = document.querySelectorAll('.diff-btn');
    const themeToggleBtn = document.getElementById('theme-toggle-btn');
    const iconMoon       = document.getElementById('icon-moon');
    const iconSun        = document.getElementById('icon-sun');
    const inputsBtn      = document.getElementById('inputs-btn');
    const inputsPanel    = document.getElementById('inputs-panel');
    const insertBtn      = document.getElementById('insert-btn');
    const swapBtn        = document.getElementById('swap-btn');
    const modeDesc       = document.getElementById('mode-desc');

    /* ── Difficulty state ── */
    let selectedCols = 30;

    diffBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        diffBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedCols = parseInt(btn.dataset.cols, 10);
        newGame();
      });
    });

    /* ── Theme toggle ── */
    let isLight = false;

    themeToggleBtn.addEventListener('click', () => {
      isLight = !isLight;
      document.body.classList.toggle('light', isLight);
      iconMoon.style.display = isLight ? 'none' : '';
      iconSun.style.display  = isLight ? ''     : 'none';
    });

    /* ── Inputs panel ── */
    let inputMode = 'insert'; // 'insert' | 'swap'

    const modeDescriptions = {
      insert: 'Selected columns are inserted at the clicked position.',
      swap:   'Selected columns swap places with the clicked column.'
    };

    inputsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      inputsPanel.classList.toggle('open');
    });
    inputsPanel.addEventListener('click', (e) => e.stopPropagation());
    document.addEventListener('click', () => inputsPanel.classList.remove('open'));

    insertBtn.addEventListener('click', () => {
      inputMode = 'insert';
      insertBtn.classList.add('active');
      swapBtn.classList.remove('active');
      modeDesc.textContent = modeDescriptions.insert;
    });

    swapBtn.addEventListener('click', () => {
      inputMode = 'swap';
      swapBtn.classList.add('active');
      insertBtn.classList.remove('active');
      modeDesc.textContent = modeDescriptions.swap;
    });

    /* ── State ── */
    const MIN_H = 44;
    const ARENA_V_PAD = 6;

    let values         = [];
    let selSet         = new Set();
    let isDragging     = false;
    let dragStartIdx   = -1;
    let dragCurrentIdx = -1;
    let running        = false;
    let finished       = false;
    let startMs        = 0;
    let tickId         = null;

    /* ── Helpers ── */
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function isSorted(arr) {
      for (let i = 1; i < arr.length; i++) if (arr[i] < arr[i - 1]) return false;
      return true;
    }

    function fmtTime(ms) {
      const totalS = Math.floor(ms / 1000);
      const m      = Math.floor(totalS / 60);
      const s      = totalS % 60;
      const tenth  = Math.floor((ms % 1000) / 100);
      return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}.${tenth}`;
    }

    /* ── Heights ── */
    function getStep() {
      const availH = arena.clientHeight - ARENA_V_PAD;
      const n = values.length;
      return n > 1 ? (availH - MIN_H) / (n - 1) : 0;
    }

    function rankToHeight(rank, step) {
      return MIN_H + (rank - 1) * step;
    }

    /* ── Drag range helper ── */
    function getRange(a, b) {
      const s = new Set();
      const lo = Math.min(a, b), hi = Math.max(a, b);
      for (let i = lo; i <= hi; i++) s.add(i);
      return s;
    }

    /* ── Move selected bars to target position (insert mode) ── */
    function moveSelectedTo(targetIdx) {
      if (selSet.size === 0 || selSet.has(targetIdx)) return;

      const selectedVals = Array.from(selSet)
        .sort((a, b) => a - b)
        .map(i => values[i]);

      const remainingPairs = values
        .map((v, i) => ({ v, i }))
        .filter(({ i }) => !selSet.has(i));

      // Insert the group just before the target column (adjusted for removed items)
      let insertAt = remainingPairs.findIndex(p => p.i >= targetIdx);
      if (insertAt === -1) insertAt = remainingPairs.length;

      values = [
        ...remainingPairs.slice(0, insertAt).map(p => p.v),
        ...selectedVals,
        ...remainingPairs.slice(insertAt).map(p => p.v)
      ];
    }

    /* ── Swap selected bars with target (swap mode) ── */
    function swapSelectedWith(targetIdx) {
      if (selSet.size === 0 || selSet.has(targetIdx)) return;

      const selIndices = Array.from(selSet).sort((a, b) => a - b);
      const n = selIndices.length;

      if (n === 1) {
        // Simple single-bar swap
        const si = selIndices[0];
        [values[si], values[targetIdx]] = [values[targetIdx], values[si]];
        return;
      }

      // Block swap: collect n target indices starting from targetIdx, skipping selected
      const targetIndices = [];
      for (let i = targetIdx; targetIndices.length < n && i < values.length; i++) {
        if (!selSet.has(i)) targetIndices.push(i);
      }
      // If not enough going forward, fill from before targetIdx
      for (let i = targetIdx - 1; targetIndices.length < n && i >= 0; i--) {
        if (!selSet.has(i)) targetIndices.unshift(i);
      }

      const count      = Math.min(n, targetIndices.length);
      const selVals    = selIndices.slice(0, count).map(i => values[i]);
      const targetVals = targetIndices.slice(0, count).map(i => values[i]);
      for (let j = 0; j < count; j++) {
        values[selIndices[j]]    = targetVals[j];
        values[targetIndices[j]] = selVals[j];
      }
    }

    /* ── Apply move based on current mode ── */
    function applyMove(targetIdx) {
      if (inputMode === 'swap') swapSelectedWith(targetIdx);
      else moveSelectedTo(targetIdx);
    }

    /* ── Check win condition ── */
    function checkWin() {
      if (isSorted(values)) {
        finished        = true;
        const elapsed   = stopTimer();
        const t         = fmtTime(elapsed);
        timerEl.textContent     = t;
        finalTimeEl.textContent = `Time: ${t}`;
        overlay.classList.add('show');
      }
    }

    /* ── Render ── */
    function render() {
      const bars = arena.children;
      const step = getStep();
      for (let i = 0; i < bars.length; i++) {
        bars[i].style.height = rankToHeight(values[i], step) + 'px';
        bars[i].classList.toggle('sel',    !finished && selSet.has(i));
        bars[i].classList.toggle('sorted', finished);
      }
    }

    /* ── Shared release handler (mouse & touch) ── */
    function handleRelease(wasDrag, releaseIdx) {
      isDragging = false;
      if (wasDrag) {
        selSet = getRange(dragStartIdx, releaseIdx);
      } else {
        const clickedIdx = releaseIdx;
        if (selSet.size > 0) {
          if (selSet.has(clickedIdx)) {
            selSet.clear();
          } else {
            applyMove(clickedIdx);
            selSet.clear();
            checkWin();
          }
        } else {
          selSet = new Set([clickedIdx]);
        }
      }
      render();
    }

    /* ── Build DOM ── */
    function buildBars(n) {
      arena.innerHTML = '';
      for (let i = 0; i < n; i++) {
        const bar = document.createElement('div');
        bar.className = 'bar';

        /* Mouse events */
        bar.addEventListener('mousedown', (e) => {
          if (finished) return;
          e.preventDefault();
          if (!running) startTimer();
          isDragging     = true;
          dragStartIdx   = i;
          dragCurrentIdx = i;
        });

        bar.addEventListener('mouseenter', () => {
          if (!isDragging) return;
          dragCurrentIdx = i;
          selSet = getRange(dragStartIdx, i);
          render();
        });

        /* Touch start */
        bar.addEventListener('touchstart', (e) => {
          if (finished) return;
          e.preventDefault();
          if (!running) startTimer();
          isDragging     = true;
          dragStartIdx   = i;
          dragCurrentIdx = i;
        }, { passive: false });

        arena.appendChild(bar);
      }
    }

    /* ── Document-level mouse events ── */
    document.addEventListener('mouseup', () => {
      if (!isDragging) return;
      const wasDrag = dragCurrentIdx !== dragStartIdx;
      handleRelease(wasDrag, dragCurrentIdx);
    });

    /* ── Document-level touch events ── */
    document.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      e.preventDefault();
      const touch = e.touches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      if (el && el.classList.contains('bar')) {
        const bars = Array.from(arena.children);
        const idx  = bars.indexOf(el);
        if (idx !== -1 && idx !== dragCurrentIdx) {
          dragCurrentIdx = idx;
          selSet = getRange(dragStartIdx, idx);
          render();
        }
      }
    }, { passive: false });

    document.addEventListener('touchend', () => {
      if (!isDragging) return;
      const wasDrag = dragCurrentIdx !== dragStartIdx;
      handleRelease(wasDrag, dragCurrentIdx);
    });

    document.addEventListener('touchcancel', () => {
      if (!isDragging) return;
      isDragging = false;
      selSet.clear();
      render();
    });

    /* ── Timer ── */
    function startTimer() {
      startMs = Date.now();
      running = true;
      tickId  = setInterval(() => {
        timerEl.textContent = fmtTime(Date.now() - startMs);
      }, 100);
    }

    function stopTimer() {
      clearInterval(tickId);
      tickId  = null;
      running = false;
      return Date.now() - startMs;
    }

    /* ── New game ── */
    function newGame() {
      const n = selectedCols;

      values = Array.from({ length: n }, (_, k) => k + 1);
      shuffle(values);
      if (isSorted(values)) {
        [values[0], values[1]] = [values[1], values[0]];
      }

      selSet         = new Set();
      isDragging     = false;
      dragStartIdx   = -1;
      dragCurrentIdx = -1;
      finished      = false;

      if (tickId) clearInterval(tickId);
      tickId  = null;
      running = false;

      timerEl.textContent  = '00:00.0';
      overlay.classList.remove('show');

      buildBars(n);
      requestAnimationFrame(render);
    }

    /* ── Control listeners ── */
    document.getElementById('new-game-btn').addEventListener('click', newGame);
    document.getElementById('play-again-btn').addEventListener('click', newGame);

    window.addEventListener('resize', render);

    /* ── Boot ── */
    newGame();
  </script>
</body>
</html>
