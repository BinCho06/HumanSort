<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="HumanSort – race the clock to manually sort shuffled columns by swapping them with clicks. Choose 20–50 columns and beat your best time!">
  <title>HumanSort</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="controls">
    <button id="new-game-btn" class="ctrl-btn">New Game</button>
    <span id="timer">00:00.0</span>
    <div id="settings-wrap">
      <button id="settings-btn" title="Settings" aria-label="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <div id="settings-panel">
        <div class="settings-section">
          <div class="settings-label">Difficulty</div>
          <div id="difficulty-group">
            <button class="diff-btn" data-cols="20">Easy</button>
            <button class="diff-btn active" data-cols="30">Normal</button>
            <button class="diff-btn" data-cols="50">Hard</button>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-label">Move Mode</div>
          <div id="mode-group">
            <button class="mode-btn active" id="insert-btn">Insert</button>
            <button class="mode-btn" id="swap-btn">Swap</button>
          </div>
          <div id="mode-desc">Selected columns are inserted at the clicked position.</div>
        </div>
        <div class="settings-section">
          <div class="settings-row">
            <span class="settings-row-label">Theme</span>
            <button id="theme-toggle-btn" title="Toggle theme" aria-label="Toggle theme">
              <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
              <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="replay-banner">
    <span>▶ Watching Replay</span>
    <button id="replay-stop-btn" class="ctrl-btn">✕ Stop</button>
  </div>

  <div id="arena"></div>

  <section id="highscores">
    <h3>🏆 High Scores</h3>
    <div id="hs-grid">
      <div class="hs-col" id="hs-easy">
        <div class="hs-col-title">Easy (20)</div>
      </div>
      <div class="hs-col" id="hs-normal">
        <div class="hs-col-title">Normal (30)</div>
      </div>
      <div class="hs-col" id="hs-hard">
        <div class="hs-col-title">Hard (50)</div>
      </div>
    </div>
  </section>

  <div id="overlay">
    <h2>🎉 Sorted!</h2>
    <div class="lbl" id="final-time"></div>
    <button id="play-again-btn">Play Again</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
